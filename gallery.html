<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery | Hotel Trimukha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BODY */

body{
background:linear-gradient(135deg,#6e1414,#8b4513,#f7e7c6);
color:#fff;
min-height:100vh;
overflow-x:hidden;
padding-bottom:80px; /* space for bottom nav */
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(110,20,20,0.95);
box-shadow:0 6px 18px rgba(0,0,0,0.6);
z-index:1000;
}

.logo{
font-size:26px;
font-weight:700;
letter-spacing:1px;
color:#ffd95a;
}

.nav-links{
display:flex;
}

.nav-links a{
color:#fff8dc;
margin-left:25px;
text-decoration:none;
font-weight:500;
position:relative;
transition:.3s;
}

.nav-links a:hover{
color:#ffd95a;
}

.nav-links a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:#ffd95a;
transition:.3s;
}

.nav-links a:hover::after{
width:100%;
}

.toggle{
display:none;
font-size:26px;
color:#ffd95a;
cursor:pointer;
}

/* GALLERY */

.gallery{
padding:120px 30px 80px;
text-align:center;
animation:fadeUp 1.2s ease;
}

.gallery h1{
font-size:42px;
color:#ffd95a;
margin-bottom:10px;
}

.gallery p{
color:#fff8dc;
opacity:.9;
}

/* GRID */

.gallery-grid{
max-width:1100px;
margin:40px auto 0;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

/* CARD STYLE */

.gallery-item{
height:220px;
border-radius:18px;
overflow:hidden;
position:relative;
background:linear-gradient(145deg,#6e1414,#8b4513);
border:1px solid rgba(255,255,255,0.15);
box-shadow:0 8px 20px rgba(0,0,0,0.6);
transition:transform .3s, box-shadow .3s;
}

.gallery-item img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.gallery-item:hover{
transform:scale(1.05);
box-shadow:0 10px 22px rgba(0,0,0,0.7);
}

.gallery-item:hover img{
transform:scale(1.1);
}

/* overlay */

.gallery-item::after{
content:"Trimukha";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:600;
color:#ffd95a;
opacity:0;
transition:.4s;
}

.gallery-item:hover::after{
opacity:1;
}

/* FOOTER */

footer{
margin-top:40px;
background:linear-gradient(90deg,#5a0f0f,#8b4513);
padding:15px;
text-align:center;
font-size:14px;
color:#fff8dc;
}

/* ANIMATION */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

.toggle{
display:block;
}

.nav-links{
position:absolute;
top:65px;
right:0;
width:100%;
background:#6e1414;
flex-direction:column;
display:none;
}

.nav-links a{
margin:0;
padding:14px;
border-top:1px solid rgba(255,255,255,0.15);
}

.nav-links.show{
display:flex;
}

.gallery-item{
height:180px;
}

}

/* ========================= */
/* 🔥 BOTTOM NAVBAR */
/* ========================= */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:65px;
background:rgba(110,20,20,0.95);
display:flex;
justify-content:space-around;
align-items:center;
box-shadow:0 -4px 15px rgba(0,0,0,0.6);
z-index:1000;
}

.bottom-nav a{
text-decoration:none;
color:#fff8dc;
font-size:12px;
display:flex;
flex-direction:column;
align-items:center;
transition:.3s;
}

.bottom-nav a i{
font-size:20px;
margin-bottom:4px;
}

.bottom-nav a:hover{
color:#ffd95a;
transform:translateY(-3px);
}

.bottom-nav a.active{
color:#ffd95a;
}

</style>
</head>

<body>

<header class="navbar">

<div class="logo">HOTEL TRIMUKHA</div>

<div class="toggle" onclick="toggleMenu()">
<i class="fas fa-bars"></i>
</div>

<nav class="nav-links" id="navLinks">
<a href="index.html">Home</a>
<a href="table.html">Table</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="gallery">

<h1>Our Gallery</h1>
<p>Moments, flavors & ambience at Trimukha</p>

<div class="gallery-grid">

<div class="gallery-item"><img src="1.jpg"></div>
<div class="gallery-item"><img src="2.jpg"></div>
<div class="gallery-item"><img src="3.jpg"></div>
<div class="gallery-item"><img src="4.jpg"></div>
<div class="gallery-item"><img src="5.jpg"></div>

</div>

</section>

<footer>
© 2026 HOTEL TRIMUKHA | Designed by vc_visioncraft
</footer>

<!-- 🔥 BOTTOM NAVBAR -->
<div class="bottom-nav">
<a href="index.html"><i class="fas fa-home"></i>Home</a>
<a href="about.html"><i class="fas fa-user"></i>About</a>
<a href="table.html"><i class="fas fa-utensils"></i>Table</a>
<a href="gallery.html" class="active"><i class="fas fa-image"></i>Gallery</a>
<a href="contact.html"><i class="fas fa-phone"></i>Contact</a>
</div>

<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("show");
}

</script>

</body>
</html>
